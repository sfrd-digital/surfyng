# Configuração nginx do Surfyng API
# Arquivo: /etc/nginx/sites-available/surfyng
# Ativar com: ln -s /etc/nginx/sites-available/surfyng /etc/nginx/sites-enabled/

# Limita requisições por IP (proteção contra abuso)
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name api.surfyng.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy reverso para o Node.js na porta 3000
server {
    listen 443 ssl http2;
    server_name api.surfyng.app;

    # Certificados SSL gerenciados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/api.surfyng.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.surfyng.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de segurança
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "no-referrer"     always;

    # Tamanho máximo do body (uploads de fotos)
    client_max_body_size 10M;

    # Healthcheck — sem rate limit
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Webhook Stripe — sem rate limit (Stripe tem IPs fixos)
    location = /api/v1/webhooks/stripe {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserva o body raw para validação de assinatura Stripe
        proxy_request_buffering off;
    }

    # Auth — rate limit mais restrito
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # API geral
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts generosos para chamadas externas (Windguru)
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
